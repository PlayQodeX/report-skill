<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="Branded Report — Markdown to a branded PDF with a title page">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="0.45" stop-color="#14121F"/>
      <stop offset="1" stop-color="#1E2230"/>
    </linearGradient>
    <radialGradient id="glowV" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(1040 70) scale(420)">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.40"/>
      <stop offset="0.55" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowI" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(120 360) scale(420)">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191527"/>
      <stop offset="1" stop-color="#0E0B16"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glowV)"/>
  <rect width="1280" height="400" fill="url(#glowI)"/>

  <!-- ── left: wordmark + tagline + chips ── -->
  <g transform="translate(80 96)">
    <rect width="60" height="60" rx="15" fill="url(#badge)"/>
    <rect x="17" y="14" width="26" height="34" rx="4" fill="#FAFBFC"/>
    <rect x="21" y="19" width="18" height="4" rx="2" fill="#8B5CF6"/>
    <rect x="21" y="27" width="18" height="2.6" rx="1.3" fill="#C9CFDE"/>
    <rect x="21" y="32" width="18" height="2.6" rx="1.3" fill="#C9CFDE"/>
    <rect x="21" y="39" width="6" height="3.4" rx="1" fill="#F43F5E"/>
    <rect x="29" y="39" width="6" height="3.4" rx="1" fill="#F59E0B"/>

    <text x="80" y="30" font-family="'Segoe UI', Inter, system-ui, sans-serif" font-size="40" font-weight="800" letter-spacing="-1" fill="#FFFFFF">Branded <tspan fill="#C4B5FD">Report</tspan></text>
    <text x="82" y="58" font-family="'Segoe UI', Inter, system-ui, sans-serif" font-size="17" fill="rgba(255,255,255,0.72)">Markdown in &#8594; a branded PDF with a title page out.</text>
  </g>

  <!-- feature chips -->
  <g font-family="'Segoe UI', Inter, system-ui, sans-serif" font-size="14" fill="#E8EBF2">
    <g transform="translate(80 226)">
      <rect width="150" height="34" rx="17" fill="rgba(139,92,246,0.14)" stroke="rgba(139,92,246,0.45)"/>
      <text x="20" y="22">Title-page cover</text>
    </g>
    <g transform="translate(244 226)">
      <rect width="138" height="34" rx="17" fill="rgba(139,92,246,0.14)" stroke="rgba(139,92,246,0.45)"/>
      <text x="20" y="22">Theme via JSON</text>
    </g>
    <g transform="translate(396 226)">
      <rect width="138" height="34" rx="17" fill="rgba(139,92,246,0.14)" stroke="rgba(139,92,246,0.45)"/>
      <text x="20" y="22">Severity tables</text>
    </g>
    <g transform="translate(548 226)">
      <rect width="176" height="34" rx="17" fill="rgba(139,92,246,0.14)" stroke="rgba(139,92,246,0.45)"/>
      <text x="20" y="22">Drop-in Claude skill</text>
    </g>
  </g>

  <text x="82" y="332" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" letter-spacing="1" fill="rgba(255,255,255,0.38)">python render-doc-pdf.py report.md  &#8594;  report.pdf</text>

  <!-- ── right: mini cover mockup ── -->
  <g transform="translate(958 36) rotate(3 116 164)" filter="url(#cardShadow)">
    <rect width="232" height="328" rx="14" fill="url(#card)" stroke="rgba(255,255,255,0.06)"/>
    <!-- badge + lockup -->
    <rect x="24" y="26" width="30" height="30" rx="8" fill="url(#badge)"/>
    <text x="33" y="47" font-family="'Segoe UI', Inter, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">R</text>
    <text x="64" y="40" font-family="'Segoe UI', Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Your Brand</text>
    <text x="64" y="52" font-family="'JetBrains Mono', monospace" font-size="6.5" letter-spacing="1.4" fill="rgba(255,255,255,0.5)">EXAMPLE.COM</text>
    <!-- eyebrow + title -->
    <text x="24" y="176" font-family="'JetBrains Mono', monospace" font-size="8" letter-spacing="3" fill="rgba(255,255,255,0.55)">AUDIT REPORT</text>
    <text x="22" y="208" font-family="'Segoe UI', Inter, sans-serif" font-size="25" font-weight="700" fill="#FFFFFF">Payments</text>
    <text x="22" y="236" font-family="'Segoe UI', Inter, sans-serif" font-size="25" font-weight="700" fill="#C4B5FD">Security Review</text>
    <!-- meta strip -->
    <line x1="24" y1="280" x2="208" y2="280" stroke="rgba(255,255,255,0.12)"/>
    <text x="24" y="296" font-family="'JetBrains Mono', monospace" font-size="6" letter-spacing="1.4" fill="rgba(255,255,255,0.4)">DATE</text>
    <text x="24" y="308" font-family="'Segoe UI', Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">2026-06-21</text>
    <text x="120" y="296" font-family="'JetBrains Mono', monospace" font-size="6" letter-spacing="1.4" fill="rgba(255,255,255,0.4)">STATUS</text>
    <text x="120" y="308" font-family="'Segoe UI', Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">Final</text>
  </g>
</svg>
