<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Branded Report logo">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#8B5CF6" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="58" fill="url(#badge)"/>
  <!-- document -->
  <g filter="url(#shadow)">
    <rect x="74" y="52" width="108" height="152" rx="12" fill="#FAFBFC"/>
  </g>
  <!-- accent title bar -->
  <rect x="92" y="74" width="72" height="12" rx="6" fill="#8B5CF6"/>
  <!-- text lines -->
  <rect x="92" y="100" width="72" height="7" rx="3.5" fill="#C9CFDE"/>
  <rect x="92" y="116" width="72" height="7" rx="3.5" fill="#C9CFDE"/>
  <rect x="92" y="132" width="48" height="7" rx="3.5" fill="#C9CFDE"/>
  <!-- mini severity row -->
  <rect x="92" y="156" width="22" height="9" rx="3" fill="#F43F5E"/>
  <rect x="120" y="156" width="22" height="9" rx="3" fill="#F59E0B"/>
  <rect x="148" y="156" width="16" height="9" rx="3" fill="#10B981"/>
  <rect x="92" y="174" width="72" height="7" rx="3.5" fill="#E8EBF2"/>
</svg>
